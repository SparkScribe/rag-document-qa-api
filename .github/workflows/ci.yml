name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  API_KEY: test-ci-api-key
  DATABASE_URL: "sqlite:///:memory:"
  QDRANT_URL: http://localhost:6333

jobs:
  lint-and-test:
    name: Lint & unit tests (mocked)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests

      - name: Pytest (unit only, no external services)
        run: pytest tests -m "not integration" -v --cov=app --cov-report=term-missing

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker compose build api

      - name: Verify image starts
        run: |
          docker compose up -d qdrant
          docker compose run --rm --no-deps api python -c "from app.main import app; print(app.title)"
